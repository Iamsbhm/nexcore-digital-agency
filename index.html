<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ══════════════════════════════════════════
         PRIMARY SEO
         Replace yourdomain.com with your real domain
    ══════════════════════════════════════════ -->
    <title>NexCore Digital Studio — Premium Web Design & Development Agency</title>
    <meta name="description" content="NexCore is a premium digital agency specialising in brand identity, web & app development, AI automation and e-commerce. 500+ projects delivered for USA clients." />
    <meta name="keywords" content="web design agency, web development, brand identity, UI UX design, mobile app development, SEO agency, e-commerce development, AI automation, New York digital agency" />
    <meta name="author" content="NexCore Digital Studio" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.yourdomain.com/" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- ══════════════════════════════════════════
         OPEN GRAPH — Facebook, WhatsApp, LinkedIn previews
    ══════════════════════════════════════════ -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.yourdomain.com/" />
    <meta property="og:title"       content="NexCore Digital Studio — Premium Digital Agency" />
    <meta property="og:description" content="Brand identity, web development, mobile apps & AI automation. 500+ projects. 200+ happy clients. Book a free strategy call." />
    <meta property="og:image"       content="https://www.yourdomain.com/og-image.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"   content="NexCore Digital Studio" />
    <meta property="og:locale"      content="en_US" />

    <!-- ══════════════════════════════════════════
         TWITTER / X CARD
    ══════════════════════════════════════════ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="NexCore Digital Studio — Premium Digital Agency" />
    <meta name="twitter:description" content="Brand identity, web & app development, AI automation. 500+ projects delivered." />
    <meta name="twitter:image"       content="https://www.yourdomain.com/og-image.jpg" />

    <!-- ══════════════════════════════════════════
         JSON-LD SCHEMA — Tells Google who you are
         (Organisation + LocalBusiness rich result)
    ══════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://www.yourdomain.com/#organization",
          "name": "NexCore Digital Studio",
          "url": "https://www.yourdomain.com/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://www.yourdomain.com/logo.png"
          },
          "description": "Premium digital agency specialising in brand identity, web development, mobile apps, AI automation and e-commerce.",
          "foundingDate": "2018",
          "numberOfEmployees": { "@type": "QuantitativeValue", "value": 15 },
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "New York",
            "addressRegion": "NY",
            "addressCountry": "US"
          },
          "contactPoint": {
            "@type": "ContactPoint",
            "contactType": "customer service",
            "availableLanguage": "English"
          },
          "sameAs": [
            "https://www.linkedin.com/company/nexcore-digital",
            "https://twitter.com/nexcoredigital"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://www.yourdomain.com/#website",
          "url": "https://www.yourdomain.com/",
          "name": "NexCore Digital Studio",
          "publisher": { "@id": "https://www.yourdomain.com/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://www.yourdomain.com/?s={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "ProfessionalService",
          "name": "NexCore Digital Studio",
          "image": "https://www.yourdomain.com/og-image.jpg",
          "url": "https://www.yourdomain.com/",
          "priceRange": "$$$",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "New York",
            "addressRegion": "NY",
            "addressCountry": "US"
          },
          "aggregateRating": {
            "@type": "AggregateRating",
            "ratingValue": "4.9",
            "reviewCount": "200"
          },
          "openingHoursSpecification": {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"],
            "opens": "09:00",
            "closes": "18:00"
          }
        }
      ]
    }
    </script>

    <!-- ══════════════════════════════════════════
         GOOGLE ANALYTICS GA4
         Replace G-XXXXXXXXXX with your Measurement ID
         from: analytics.google.com
    ══════════════════════════════════════════ -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX', {
        page_title: document.title,
        send_page_view: true
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
