    <!-- ══════════════════════════════════════════
         GOOGLE ANALYTICS GA4 (Optimized Dynamic Loading)
         Loads tag manager only if a valid ID is configured
         ══════════════════════════════════════════ -->
    <script>
      (function() {
        const gaId = 'G-XXXXXXXXXX'; // Replace with your measurement ID from analytics.google.com
        if (gaId && gaId !== 'G-XXXXXXXXXX') {
          const script = document.createElement('script');
          script.async = true;
          script.src = 'https://www.googletagmanager.com/gtag/js?id=' + gaId;
          document.head.appendChild(script);

          window.dataLayer = window.dataLayer || [];
          function gtag(){ dataLayer.push(arguments); }
          window.gtag = gtag;
          gtag('js', new Date());
          gtag('config', gaId, {
            page_title: document.title,
            send_page_view: true
          });
        }
      })();
    </script>
