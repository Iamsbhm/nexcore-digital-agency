<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="TxPZr0deiOWsHHPGg7g5RSdCN1HSVYQ0XECXAhRBt7s" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Preconnect to Google Fonts: eliminates DNS + SSL handshake delay (Core Web Vitals) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Google Fonts as <link> — faster than CSS @import (avoids render-blocking) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,300;0,400;1,400&family=JetBrains+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" />

    <!-- ══════════════════════════════════════════
         PRIMARY SEO
         Replace yourdomain.com with your real domain
    ══════════════════════════════════════════ -->
    <title>Pixel Vance Digital — Premium Web Design &amp; Development Agency</title>
    <meta name="description" content="Pixel Vance Digital is a premium digital agency specialising in brand identity, web &amp; app development, AI automation and e-commerce. 500+ projects delivered for USA clients." />
    <meta name="keywords" content="web design agency, web development, brand identity, UI UX design, mobile app development, SEO agency, e-commerce development, AI automation, digital agency" />
    <meta name="author" content="Pixel Vance Digital" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.pixelvancedigital.com/" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- ══════════════════════════════════════════
         OPEN GRAPH — Facebook, WhatsApp, LinkedIn previews
    ══════════════════════════════════════════ -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.pixelvancedigital.com/" />
    <meta property="og:title"       content="Pixel Vance Digital — Premium Digital Agency" />
    <meta property="og:description" content="Brand identity, web development, mobile apps &amp; AI automation. 500+ projects. 200+ happy clients. Book a free strategy call." />
    <meta property="og:image"       content="https://www.pixelvancedigital.com/og-image.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"   content="Pixel Vance Digital" />
    <meta property="og:locale"      content="en_US" />

    <!-- ══════════════════════════════════════════
         TWITTER / X CARD
    ══════════════════════════════════════════ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Pixel Vance Digital — Premium Digital Agency" />
    <meta name="twitter:description" content="Brand identity, web & app development, AI automation. 500+ projects delivered." />
    <meta name="twitter:image"       content="https://www.pixelvancedigital.com/og-image.jpg" />

    <!-- ══════════════════════════════════════════
         JSON-LD SCHEMA — Tells Google who you are
         (Organisation + LocalBusiness rich result)
    ══════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://www.pixelvancedigital.com/#organization",
          "name": "Pixel Vance Digital",
          "url": "https://www.pixelvancedigital.com/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://www.pixelvancedigital.com/logo.png"
          },
          "description": "Premium digital agency specialising in brand identity, web development, mobile apps, AI automation and e-commerce.",
          "foundingDate": "2018",
          "numberOfEmployees": { "@type": "QuantitativeValue", "value": 15 },
          "address": {
            "@type": "PostalAddress",
            "addressCountry": "US"
          },
          "contactPoint": {
            "@type": "ContactPoint",
            "contactType": "customer service",
            "availableLanguage": "English"
          },
          "sameAs": [
            "https://www.linkedin.com/company/pixelvancedigital",
            "https://twitter.com/pixelvancedigital"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://www.pixelvancedigital.com/#website",
          "url": "https://www.pixelvancedigital.com/",
          "name": "Pixel Vance Digital",
          "publisher": { "@id": "https://www.pixelvancedigital.com/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://www.pixelvancedigital.com/?s={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "ProfessionalService",
          "name": "Pixel Vance Digital",
          "image": "https://www.pixelvancedigital.com/og-image.jpg",
          "url": "https://www.pixelvancedigital.com/",
          "priceRange": "$$$",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "New York",
            "addressRegion": "NY",
            "addressCountry": "US"
          },
          "aggregateRating": {
            "@type": "AggregateRating",
            "ratingValue": "4.9",
            "reviewCount": "200"
          },
          "openingHoursSpecification": {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"],
            "opens": "09:00",
            "closes": "18:00"
          }
        }
      ]
    }
    </script>

    <!-- ══════════════════════════════════════════
         GOOGLE ANALYTICS GA4
         Replace G-XXXXXXXXXX with your Measurement ID
         from: analytics.google.com
    ══════════════════════════════════════════ -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX', {
        page_title: document.title,
        send_page_view: true
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
